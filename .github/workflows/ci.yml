name: CI

on:
  push:
    branches:
      - master
      - python-rewrite
  pull_request:
    branches:
      - master
      - python-rewrite

permissions:
  contents: read

jobs:
  backend:
    name: Backend
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.13"
          cache: pip

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -e .
          pip install ruff mypy pytest pytest-cov pytest-asyncio respx

      - name: Ruff check
        run: ruff check app/ tests/

      - name: MyPy
        run: mypy app/ --ignore-missing-imports --no-strict-optional
        continue-on-error: true

      - name: Test with coverage
        run: pytest tests/ -q --cov=app --cov-report=term-missing --cov-fail-under=80

  frontend:
    name: Frontend
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        working-directory: frontend
        run: npm ci

      - name: Lint
        working-directory: frontend
        run: npm run lint

      - name: Type check
        working-directory: frontend
        run: npm run typecheck

      - name: Test
        working-directory: frontend
        run: npm run test -- --coverage --coverage-reporter=text
        env:
          CI: true

      - name: Build
        working-directory: frontend
        run: npm run build

      - name: Bundle size check
        working-directory: frontend
        run: |
          JS_SIZE=$(gzip -c dist/assets/index-*.js | wc -c)
          echo "JS bundle (gzip): ${JS_SIZE} bytes"
          if [ "$JS_SIZE" -gt 307200 ]; then
            echo "ERROR: JS bundle exceeds 300KB gzip limit"
            exit 1
          fi